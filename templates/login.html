<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { background:white; font-family:Arial; text-align:center; padding:50px; }
        h1 { color:#ff0066; font-size:50px; margin-bottom:30px; }
        input { padding:12px; width:250px; margin:10px 0; font-size:18px; }
        button { padding:12px 25px; background:#ff0066; color:white; border:none; border-radius:8px; font-size:18px; cursor:pointer; }
        button:hover { background:#cc0055; }
        p.error { color:red; font-weight:bold; }
    </style>
</head>
<body>
    <h1>Enter Your Details</h1>
    <form method="POST">
        <input type="text" name="name" placeholder="Your Name" required><br>
        <input type="date" name="dob" required><br>
        <button type="submit">Start Surprise 🎉</button>
    </form>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</body>
</html>
