<!DOCTYPE html>
<html>
<head>
    <title>Photos 5-6</title>
    <meta charset="UTF-8">
    <style>
        body { 
            background: white; 
            text-align: center; 
            font-family: Arial, sans-serif; 
            padding: 20px; 
        }
        h1 {
            color: #ff0066;
            font-size: 36px;
            margin-bottom: 20px;
        }
        img { 
            margin: 10px; 
            border-radius: 10px; 
            width: 300px; 
        }
        button { 
            padding: 12px 25px; 
            background: #ff0066; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            margin-top: 20px; 
        }
        button:hover { 
            background: #cc0055; 
        }
    </style>
</head>
<body>
    <h1>Even More Memories ❤️</h1>

    <!-- Photos 5 & 6 -->
    <img src="{{ url_for('static', filename='photo5.jpg') }}" alt="Photo 5">
    <img src="{{ url_for('static', filename='photo6.jpg') }}" alt="Photo 6">

    <!-- Hidden music still playing -->
    <audio autoplay loop hidden>
        <source src="{{ url_for('static', filename='music.mp3') }}" type="audio/mpeg">
    </audio>

    <!-- Button to go to feedback form -->
<br>
<form action="{{ url_for('feedback') }}" method="get" style="display:inline;">
    <button type="submit">Give Feedback 💌</button>
</form>
