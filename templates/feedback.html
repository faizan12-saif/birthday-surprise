<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
    <style>
        body {
            background: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }
        input, textarea {
            width: 300px;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            padding: 12px 25px;
            background: #ff0066;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover { background: #cc0055; }
        p.message { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>How did you like your surprise? 🎉</h1>

    {% if message %}
        <p class="message">{{ message }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="name" placeholder="Your Name" required><br>
        <textarea name="feedback" placeholder="Your Feedback" rows="5" required></textarea><br>
        <button type="submit">Submit Feedback</button>
    </form>
</body>
</html>
